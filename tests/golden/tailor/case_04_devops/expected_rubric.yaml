rubric:
  - criterion: "Tailored bullets mention DevOps-relevant skills"
    weight: 0.25
    type: keyword_presence
    keywords:
      - Terraform
      - CI/CD
      - Kubernetes
      - AWS
      - infrastructure
    min_matches: 3
  - criterion: "Output is valid YAML that preserves resume structure"
    weight: 0.25
    type: structural_check
    checks:
      - type: regex_match
        value: "^cv:"
      - type: regex_match
        value: "experience:"
      - type: regex_match
        value: "highlights:"
      - type: not_contains
        value: "```"
  - criterion: "No fabricated metrics or experiences"
    weight: 0.25
    type: factual_accuracy
    forbidden_patterns:
      - "\\b(?:Datadog|25K)\\b"
      - "\\btrillions\\b"
  - criterion: "Rewritten bullets are specific and quantified"
    weight: 0.25
    type: subjective_quality
    description: "Bullets should contain specific metrics, technologies, and outcomes rather than generic descriptions"
    scoring_guide: "Score 80+ if most bullets have concrete numbers and specific tech. Score 50-80 if some bullets are specific. Below 50 if mostly generic."
