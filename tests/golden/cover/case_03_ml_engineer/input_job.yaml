raw_text: |
  Stripe is looking for a Machine Learning Engineer to join our Risk & Fraud team.
  You will build and deploy models that protect millions of businesses from fraudulent transactions,
  processing over $800B in annual payment volume.

  Requirements:
  - 3+ years of experience building and deploying ML models in production
  - Strong proficiency in PyTorch or TensorFlow
  - Expert Python skills with software engineering best practices
  - Experience with feature engineering and feature stores
  - Solid SQL skills for data analysis and pipeline development
  - MS or PhD in Computer Science, Machine Learning, or related field

  Preferred:
  - Experience in fraud detection or financial risk modeling
  - Real-time inference systems at scale
  - Distributed model training
  - A/B testing and experimentation frameworks
  - Experience with payment systems or fintech
