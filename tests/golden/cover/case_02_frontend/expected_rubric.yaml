rubric:
  - criterion: "Cover letter mentions target company by name"
    weight: 0.2
    type: keyword_presence
    keywords:
      - Shopify
      - Senior Frontend
    min_matches: 1
  - criterion: "References specific projects or metrics from resume"
    weight: 0.3
    type: keyword_presence
    keywords:
      - "35%"
      - Lighthouse
      - component library
      - PixelCraft
      - "1.1s"
      - "$2M"
    min_matches: 2
  - criterion: "Has proper cover letter structure"
    weight: 0.25
    type: structural_check
    checks:
      - type: min_length
        value: 500
      - type: max_length
        value: 5000
      - type: line_count_min
        value: 10
      - type: not_contains
        value: "[Your Name]"
  - criterion: "No fabricated experiences or skills"
    weight: 0.25
    type: factual_accuracy
    forbidden_patterns:
      - "worked at Shopify"
      - "my time at Shopify"
      - "during my tenure at Shopify"
