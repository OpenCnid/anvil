<!DOCTYPE html>
<html lang="{{ locale.language_iso_639_1 }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ cv.name }}'s CV</title>
    <style>
        :root {
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a68;
            --text-muted: #7a7a94;
            --accent-primary: #2563eb;
            --accent-hover: #1d4ed8;
            --chip-bg: #f0f4ff;
            --chip-border: #dbe4ff;
            --chip-text: #2563eb;
            --rule: #e2e4ea;
            --background: #ffffff;
            --font-body: "IBM Plex Sans", "Inter", -apple-system, BlinkMacSystemFont,
                         "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: "IBM Plex Mono", "JetBrains Mono", "Fira Code", "SF Mono",
                         "Cascadia Code", "Consolas", monospace;
            --content-max-width: 720px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--background);
        }

        .container {
            max-width: var(--content-max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            margin-top: 1.4rem;
            margin-bottom: 0;
            padding-bottom: 0.25rem;
            border-bottom: 2px solid var(--accent-primary);
            display: inline-block;
            min-width: 40px;
        }

        /* Section wrapper to ensure block flow after inline h2 */
        .markdown-body h2 + * { clear: both; }
        .markdown-body h2 { display: block; border-bottom: 2px solid var(--accent-primary); }
        .markdown-body h2::after { content: ""; display: block; }

        h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 0.75rem;
            margin-bottom: 0.15rem;
        }

        a {
            color: var(--accent-primary);
            text-decoration: underline;
        }
        a:hover { color: var(--accent-hover); }

        p {
            margin: 0.25rem 0;
            color: var(--text-secondary);
        }

        ul {
            margin: 0.25rem 0;
            padding-left: 1.5rem;
        }
        li { margin-bottom: 0.15rem; color: var(--text-primary); }

        /* Skill chip styling for inline items */
        code {
            display: inline-block;
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 4px;
            color: var(--chip-text);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 2px 6px;
            margin: 0 2px 2px 0;
        }

        .markdown-body {
            padding-top: 0.5rem;
        }

        @media (max-width: 767px) {
            h1 { font-size: 2.0rem; }
            .container { padding: 1rem; }
        }

        @media print {
            body { background: white; color: black; }
            a { color: black; text-decoration: underline; }
            .container { max-width: 100%; padding: 0; }
            code {
                border: 1px solid #999;
                background: #f5f5f5;
                color: #333;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <article class="markdown-body">
            {{ html_body|indent(12) }}
        </article>
    </div>
</body>
</html>
